- displayName: AI комплексный тест основных функций Runterra
  id: ai-комплексный-тест-основных-функций-runterra
  steps:
    - goal: >-
        Проверить, что приложение Runterra стабильно работает для типичных
        сценариев пользователя:
          - запуск и вход в приложение;
          - выбор города и отображение карты только выбранного города (по умолчанию Санкт-Петербург);
          - базовая работа с картой (масштабирование и перемещение без «улёта» с города);
          - просмотр списка событий и карточек событий;
          - открытие профиля и основной статистики;
          - отсутствие падений и зависаний при активной навигации по разделам.
      hint: >-
        Если виден экран выбора города — сначала выбери Санкт-Петербург. Затем
        попробуй открыть карту, список событий и
          профиль пользователя, переключаясь между ними.
      successCriteria: >-
        В конце теста на экране должно быть открыто приложение Runterra без
        экранов с ошибкой, крашей или диалогов с
          сообщениями об ошибках. Допустимы любые основные разделы приложения (карта, список событий, профиль, пробежки),
          главное — интерфейс должен быть интерактивным, без аварийного завершения и без зависших диалогов.
