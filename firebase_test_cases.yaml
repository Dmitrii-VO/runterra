- displayName: 1. Проверка карты и территорий (Гость/Новый пользователь)
  steps:
    - goal: >-
        Открыть приложение и пройти экраны приветствия или нажать 'Пропустить', если доступно.
        Убедиться, что новый пользователь попадает на главный экран.
      successCriteria: >-
        Отображается экран входа или главный экран с картой.
    - goal: >-
        Если приложение требует входа, выполнить вход с тестовыми учетными данными или зарегистрироваться как новый пользователь.
      hint: >-
        Используйте email: test@runterra.app, пароль: password123, если есть поле ввода. Иначе зарегистрируйтесь.
      successCriteria: >-
        Отображается главная карта города (Санкт-Петербург).
    - goal: >-
        Проверить наличие цветных полигонов (территорий) на карте.
        Попробовать перемещать карту и менять масштаб.
      successCriteria: >-
        На карте видны зоны (территории) разных цветов. Карта реагирует на жесты.
    - goal: >-
        Нажать на любую территорию на карте, чтобы увидеть её детали.
      successCriteria: >-
        Открылась карточка территории с названием и статусом.

- displayName: 2. Профиль пользователя и Настройки
  steps:
    - goal: >-
        Найти и нажать кнопку или иконку 'Профиль' (обычно в нижнем меню или углу экрана).
      successCriteria: >-
        Открылся экран профиля пользователя.
    - goal: >-
        Убедиться, что отображается имя пользователя или заглушка.
      successCriteria: >-
        Имя пользователя отображается корректно.
    - goal: >-
        Найти кнопку настроек (шестеренка) и нажать её.
      successCriteria: >-
        Открылся экран настроек приложения.

- displayName: 3. Просмотр списка клубов
  steps:
    - goal: >-
        Перейти в раздел 'Клубы' или 'Сообщества' через меню навигации.
      successCriteria: >-
        Отображается список клубов.
    - goal: >-
        Нажать на любой клуб в списке.
      successCriteria: >-
        Открылась страница с детальной информацией о клубе (название, описание).
